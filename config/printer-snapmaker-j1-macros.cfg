[gcode_macro G28]
rename_existing: G28.0
description: Autohome. Usage: G28 [X] [Y] [Z]
gcode:
    {% set active_extruder = printer.toolhead.extruder %}
    G28.0 {rawparams}


    ; Lower Z first to prevent extruders crashing into
    {% if (params.X is undefined and params.Y is undefined) or params.Z is defined  %}
        SAVE_GCODE_STATE
        G90
        # G1 Z10
        RESTORE_GCODE_STATE
    {% endif %}

    ; When homing Y, move it to 0 to prevent cable stress
    {% if (params.X is undefined and params.Z is undefined) or params.Y is defined  %}
        SAVE_GCODE_STATE
        G90
        # G1 Y0
        RESTORE_GCODE_STATE
    {% endif %}

    {% if printer.toolhead.extruder != active_extruder %}
        ACTIVATE_EXTRUDER EXTRUDER={active_extruder}
    {% endif %}
    {% if printer.toolhead.extruder == 'extruder' %}
        SET_DUAL_CARRIAGE CARRIAGE=0
        ;G92 X{printer.toolhead.axis_minimum.x}
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1
        ;G92 X{printer.toolhead.axis_maximum.x}
    {% endif %}

[gcode_macro M104]
rename_existing: M104.0
description: Set Hotend Temperature. Usage [S<temp>] [T<index>]
gcode:
    ; RESPOND MSG="Set Temp: {printer['gcode_macro _J1_RUNTIME_STATE'].left_temp|int} {printer['gcode_macro _J1_RUNTIME_STATE'].right_temp|int}"
    {% set temperature = params.S|default(0)|float %}
    {% set extruder_index = params.T|default(-1)|int %}
    {% if extruder_index == -1 %}
    {% if printer.toolhead.extruder  == 'extruder' %}
            {% set extruder_index = 0 %}
    {% else %}
            {% set extruder_index = 1 %}
    {% endif %}
    {% endif %}

    {% if extruder_index == 0 %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={temperature}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={temperature}
    {% endif %}



    ; RESPOND MSG="M104.0 S{temperature} T{extruder_index}"
    M104.0 S{temperature} T{extruder_index}
    ; RESPOND MSG="Set Temp: {printer['gcode_macro _J1_RUNTIME_STATE'].left_temp|int} {printer['gcode_macro _J1_RUNTIME_STATE'].right_temp|int}"

[gcode_macro M109]
rename_existing: M109.0
description: Wait for Hotend Temperature. M109 [S<temp>] [T<index>]
gcode:
    {% set temperature = params.S|default(0)|float %}
    {% if printer.toolhead.extruder  == 'extruder' %}
        {% set extruder_index_default = 0 %}
    {% else %}
        {% set extruder_index_default = 1 %}
    {% endif %}
    {% set extruder_index = params.T|default(extruder_index_default)|int %}
    M109.0 S{temperature} T{extruder_index}

# It seems that cura does not control the second fan in copy/mirror mode, so we
# have to take care of that.
[gcode_macro M106]
description: Set Fan Speed. Usage: M106 [P<index>] [S<speed>]
gcode:
    {% set fan_speed = params.S|default(255)|float / 255.0 %}
    {% set fan_index = params.P|default(0)|int %}

    {% if params.P is defined %}
        {% if fan_index == 0 %}
            SET_FAN_SPEED FAN=left_part_fan SPEED={fan_speed}
        {% elif fan_index == 1 %}
            SET_FAN_SPEED FAN=right_part_fan SPEED={fan_speed}
        {% endif %}    
    {% else %}
        # {% if printer.dual_carriage['carriage_1'] is in (['COPY', 'MIRROR']) %}
        #     SET_FAN_SPEED FAN=left_part_fan SPEED={fan_speed}
        #     SET_FAN_SPEED FAN=right_part_fan SPEED={fan_speed}
        # {% else %}
            {% set current_fan_index = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
            {% set fan_index = params.P|default(current_fan_index)|int %}
            {% set fan = 'left_part_fan' if fan_index == 0 else 'right_part_fan' %}

            SET_FAN_SPEED FAN={fan} SPEED={fan_speed}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE={fan} VALUE={fan_speed}
        # {% endif %}    
    {% endif %}

[gcode_macro M107]
description: Fan Off. Usage: M107 [P<index>]
gcode:
    {% if params.P is defined %}
        M106 P{params.P} S0
    {% else %}
        M106 S0
    {% endif %}

[gcode_macro T1]
description: Activate the right extruder in IDEX mode
gcode:
    #TODO: Part fan handling
    ;RESPOND MSG="Switch to Extruder 1: {idex_mode} {printer["gcode_macro _J1_RUNTIME_STATE"].left_temp|int} {printer['gcode_macro _J1_CONFIG'].right_temp|int}"

    {% if printer.toolhead.extruder == 'extruder' %}
        PARK_LEFT_EXTRUDER
        
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_DUAL_CARRIAGE CARRIAGE=1
        G92 X{printer.toolhead.axis_maximum.x}

        SET_RIGHT_ADJUSTMENTS OP=apply
        
        {% if printer["gcode_macro _J1_CONFIG"].wipe_on_activate|lower == 'true' %}
            G12
        {% endif %}
        {% if printer["gcode_macro _J1_RUNTIME_STATE"].right_temp >= 0 %} 
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={printer["gcode_macro _J1_RUNTIME_STATE"].right_temp|int}
            # set upper limit?? 
            TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={printer["gcode_macro _J1_RUNTIME_STATE"].right_temp|float -1.0}
        {% endif %}
        GET_POSITION
    {% endif %}


[gcode_macro T0]
description: Activate the left extruder in IDEX mode
gcode:
    ; RESPOND MSG="Switch to Extruder 0: {idex_mode} {printer["gcode_macro _J1_RUNTIME_STATE"].left_temp|int} {printer['gcode_macro _J1_RUNTIME_STATE'].right_temp|int}"
    #TODO: Part fan handling
    {% if printer.toolhead.extruder == 'extruder1' %}
        GET_POSITION        

        PARK_RIGHT_EXTRUDER

        ACTIVATE_EXTRUDER EXTRUDER=extruder

        SET_RIGHT_ADJUSTMENTS OP=reset
        SET_DUAL_CARRIAGE CARRIAGE=0        

        G92 X{printer.toolhead.axis_minimum.x}
        {% if printer["gcode_macro _J1_CONFIG"].wipe_on_activate|lower == 'true' %}
            G12
        {% endif %}
        {% if printer["gcode_macro _J1_RUNTIME_STATE"].left_temp > 0 %}
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={printer["gcode_macro _J1_RUNTIME_STATE"].left_temp|int}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={printer["gcode_macro _J1_RUNTIME_STATE"].left_temp|float - 1.0}
        {% endif %}
    {% endif %}

