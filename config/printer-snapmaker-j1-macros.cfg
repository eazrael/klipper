[respond]
[gcode_arcs]

[gcode_macro _J1_RUNTIME_STATE]
variable_left_part_fan: 0
variable_right_part_fan: 0
variable_left_temp: -1
variable_right_temp: -1
gcode: 
    ; no op just some state

[gcode_macro RESET_EXTRA_RUNTIME_STATE]
gcode: 
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan VALUE=0
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE=0
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE=-1
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE=-1

[gcode_macro SET_RIGHT_ADJUSTMENTS]
gcode:
    ; RESPOND MSG="SET_RIGHT_ADJUSTMENTS {printer['gcode_macro _J1_CONFIG']} {printer['gcode_macro _J1_CONFIG'].right_nozzle_adjust_y|float} {printer.right_nozzle_adjust_y}"
    {% if params.OP|lower == 'reset'  %}
        RESPOND MSG="resetting offsets"
        SET_GCODE_OFFSET X=0
        SET_GCODE_OFFSET Y=0
        SET_GCODE_OFFSET Z=0   
    {% elif params.OP|lower == 'apply' %}
        RESPOND MSG="applying offsets"
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|float}
        SET_GCODE_OFFSET Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y|float}
        SET_GCODE_OFFSET Z={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_z|float}
    {% else %}
        RESPOND MSG="unknown op {params.OP}"
    {% endif %}

[gcode_macro PARK_RIGHT_EXTRUDER]
gcode:
    {% if printer.dual_carriage['carriage_0'] != 'INACTIVE' %}
        RESPOND MSG="Can only park right extruder when PRIMARY in IDEX mode"
        # { action_raise_error("Can only park right extruder when PRIMARY in IDEX mode") }
    {% endif %}

    SAVE_GCODE_STATE NAME=park1

    G90

    SET_RIGHT_ADJUSTMENTS op=reset    
    G1 X{printer.toolhead.axis_maximum.x} F{printer.toolhead.max_velocity * 60.0}

    SET_RIGHT_ADJUSTMENTS op=apply
    RESTORE_GCODE_STATE NAME=park1

[gcode_macro PARK_LEFT_EXTRUDER]
gcode:
    {% if printer.dual_carriage['carriage_0'] != 'PRIMARY' %}
        RESPOND MSG="Can only park left extruder when PRIMARY in IDEX mode"
        # { action_raise_error("Can only park left extruder when PRIMARY in IDEX mode") }
    {% endif %}

    SAVE_GCODE_STATE NAME=park0
    G90
    ; G92 X{printer.toolhead.position.x}
    ; TODO: better read homing speed from config?
    G1 X{printer.toolhead.axis_minimum.x} F{printer.toolhead.max_velocity * 60.0}
    #SET_FAN_SPEED FAN=left_part_fan SPEED=0.0
    RESTORE_GCODE_STATE NAME=park0


